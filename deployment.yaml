apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-cicd-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-cicd-app

  template:
    metadata:
      labels:
        app: ai-cicd-app

    spec:
      containers:
      - name: ai-container
        image: ai-cicd-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
